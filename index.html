<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 2 - Librería utileria.js</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="contenedor-principal">

        <section class="tarjeta-formulario">

            <div class="encabezado">
                <img src="img/log.jpg" alt="Icono de login">
                <h1>Registro de Usuario</h1>
                <p>
                    Formulario que utiliza funciones de la librería 
                    <strong>utileria.js</strong> para validar datos.
                </p>
            </div>

            <form id="formRegistro">

                <div class="grupo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Ejemplo: Juan Pérez">
                    <span class="error" id="errorNombre"></span>
                </div>

                <div class="grupo">
                    <label for="correo">Correo electrónico</label>
                    <input type="text" id="correo" placeholder="Ejemplo: alumno@gmail.com">
                    <span class="error" id="errorCorreo"></span>
                </div>

                <div class="grupo">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" placeholder="Ejemplo: 9511234567">
                    <span class="error" id="errorTelefono"></span>
                </div>

                <div class="grupo">
                    <label for="numeroControl">Número de control</label>
                    <input type="text" id="numeroControl" placeholder="Máximo 8 dígitos">
                    <span class="error" id="errorNumero"></span>
                </div>

                <div class="grupo">
                    <label for="fechaNacimiento">Fecha de nacimiento</label>
                    <input type="date" id="fechaNacimiento">
                    <span class="error" id="errorFecha"></span>
                </div>

                <div class="grupo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ejemplo: Alumno123!">
                    <span class="error" id="errorPassword"></span>
                </div>

                <button type="submit">Validar registro</button>

                <p id="mensajeGeneral"></p>

            </form>

            <div class="acciones">
                <a href="login.html">Ir al login</a>
            </div>

        </section>

    </main>

    <div class="modal" id="modalEdad">
        <div class="contenido-modal">
            <h2>Resultado del registro</h2>

            <p id="textoModal"></p>

            <button id="btnCerrarModal">Cerrar</button>
        </div>
    </div>

    <script src="js/utileria.js"></script>

    <script>
        const formulario = document.getElementById("formRegistro");

        const nombre = document.getElementById("nombre");
        const correo = document.getElementById("correo");
        const telefono = document.getElementById("telefono");
        const numeroControl = document.getElementById("numeroControl");
        const fechaNacimiento = document.getElementById("fechaNacimiento");
        const password = document.getElementById("password");

        const errorNombre = document.getElementById("errorNombre");
        const errorCorreo = document.getElementById("errorCorreo");
        const errorTelefono = document.getElementById("errorTelefono");
        const errorNumero = document.getElementById("errorNumero");
        const errorFecha = document.getElementById("errorFecha");
        const errorPassword = document.getElementById("errorPassword");

        const mensajeGeneral = document.getElementById("mensajeGeneral");

        const modalEdad = document.getElementById("modalEdad");
        const textoModal = document.getElementById("textoModal");
        const btnCerrarModal = document.getElementById("btnCerrarModal");

        formulario.addEventListener("submit", function(evento) {
            evento.preventDefault();

            limpiarMensajes();

            let formularioValido = true;

            let nombreFormateado = formatearNombre(nombre.value);
            nombre.value = nombreFormateado;

            if (!soloLetras(nombreFormateado)) {
                errorNombre.textContent = "El nombre solo debe contener letras y espacios.";
                formularioValido = false;
            }

            if (!validarCorreo(correo.value)) {
                errorCorreo.textContent = "Ingresa un correo electrónico válido.";
                formularioValido = false;
            }

            if (!validarTelefono(telefono.value)) {
                errorTelefono.textContent = "El teléfono debe contener exactamente 10 dígitos.";
                formularioValido = false;
            }

            if (!validarLongitud(numeroControl.value, 8)) {
                errorNumero.textContent = "El número de control debe tener máximo 8 dígitos numéricos.";
                formularioValido = false;
            }

            let edad = calcularEdad(fechaNacimiento.value);

            if (edad === -1) {
                errorFecha.textContent = "Selecciona una fecha de nacimiento válida.";
                formularioValido = false;
            } else if (!esMayorDeEdad(fechaNacimiento.value)) {
                errorFecha.textContent = "Debes ser mayor de edad para registrarte.";
                formularioValido = false;
            }

            if (!validarPassword(password.value)) {
                errorPassword.textContent = "La contraseña debe tener mínimo 8 caracteres, mayúscula, minúscula, número y carácter especial.";
                formularioValido = false;
            }

            if (!formularioValido) {
                mensajeGeneral.textContent = "Revisa los campos marcados antes de continuar.";
                mensajeGeneral.className = "mensaje-error";
                return;
            }

            mensajeGeneral.textContent = "Registro validado correctamente.";
            mensajeGeneral.className = "mensaje-correcto";

            textoModal.textContent = "Hola " + nombreFormateado + ". Tu edad calculada es de " + edad + " años. El formulario fue validado correctamente.";
            modalEdad.classList.add("activo");
        });

        btnCerrarModal.addEventListener("click", function() {
            modalEdad.classList.remove("activo");
        });

        function limpiarMensajes() {
            errorNombre.textContent = "";
            errorCorreo.textContent = "";
            errorTelefono.textContent = "";
            errorNumero.textContent = "";
            errorFecha.textContent = "";
            errorPassword.textContent = "";
            mensajeGeneral.textContent = "";
            mensajeGeneral.className = "";
        }
    </script>

</body>
</html>
