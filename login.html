<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Actividad 2</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="contenedor-principal">

        <section class="tarjeta-formulario">

            <div class="encabezado">
                <img src="img/login.jpg" alt="Icono de login">
                <h1>Inicio de Sesión</h1>
                <p>
                    <strong>utileria.js</strong>.
                </p>
            </div>

            <form id="formLogin">

                <div class="grupo">
                    <label for="correoLogin">Correo electrónico</label>
                    <input 
                        type="text" 
                        id="correoLogin" 
                        placeholder="Ejemplo: alumno@gmail.com"
                    >
                    <span class="error" id="errorCorreoLogin"></span>
                </div>

                <div class="grupo">
                    <label for="passwordLogin">Contraseña</label>
                    <input 
                        type="password" 
                        id="passwordLogin" 
                        placeholder="Ejemplo: Alumno123!"
                    >
                    <span class="error" id="errorPasswordLogin"></span>
                </div>

                <button type="submit">Ingresar</button>

                <p id="mensajeLogin"></p>

            </form>

            <div class="acciones">
                <a href="index.html">Volver al formulario</a>
            </div>

        </section>

    </main>

    <script src="js/utileria.js"></script>

    <script>
        const formLogin = document.getElementById("formLogin");

        const correoLogin = document.getElementById("correoLogin");
        const passwordLogin = document.getElementById("passwordLogin");

        const errorCorreoLogin = document.getElementById("errorCorreoLogin");
        const errorPasswordLogin = document.getElementById("errorPasswordLogin");

        const mensajeLogin = document.getElementById("mensajeLogin");

        formLogin.addEventListener("submit", function(evento) {
            evento.preventDefault();

            limpiarErroresLogin();

            let loginValido = true;

            if (!validarCorreo(correoLogin.value)) {
                errorCorreoLogin.textContent = "Ingresa un correo electrónico válido.";
                loginValido = false;
            }

            if (!validarPassword(passwordLogin.value)) {
                errorPasswordLogin.textContent = "La contraseña debe tener mínimo 8 caracteres, mayúscula, minúscula, número y carácter especial.";
                loginValido = false;
            }

            if (!loginValido) { 
                mensajeLogin.textContent = "No se pudo iniciar sesión. Revisa los datos ingresados.";
                mensajeLogin.className = "mensaje-error";
                return;
            }

            mensajeLogin.textContent = "Inicio de sesión validado correctamente.";
            mensajeLogin.className = "mensaje-correcto";
        });

        function limpiarErroresLogin() {
            errorCorreoLogin.textContent = "";
            errorPasswordLogin.textContent = "";
            mensajeLogin.textContent = "";
            mensajeLogin.className = "";
        }
    </script>

</body>
</html>
